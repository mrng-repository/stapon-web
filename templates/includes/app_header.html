{% load static %}

<header class="stpn-shared-header">
    <div class="stpn-shared-header-inner">

        <div class="stpn-shared-header-left">
            <a href="{{ header_logo_url|default:'/' }}" class="stpn-header-logo-link">
                <img src="{% static 'images/stapon-header-logo.png' %}" alt="スタポン" class="stpn-header-logo">
            </a>
        </div>

        <div class="stpn-shared-header-right">
            {% if header_subtext %}
                <span class="stpn-header-subtext">{{ header_subtext }}</span>
            {% endif %}

            {% if logout_url %}
                <a href="{{ logout_url }}" class="stpn-header-action-btn">ログアウト</a>
            {% endif %}
        </div>
    </div>
</header>
<style>
    .stpn-header-logo-link {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
    }

    .stpn-header-logo {
        height: 48px;
        width: auto;
        display: block;
    }

    .stpn-header-logo-text {
        font-size: 22px;
        font-weight: 700;
        color: #111827;
        line-height: 1;
    }
</style>
